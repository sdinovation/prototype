<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 检索增强生成系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            color: #00d4ff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .subtitle span {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            padding: 3px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            margin: 0 4px;
            font-size: 12px;
        }
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            border-color: #00d4ff;
        }
        .input-area input::placeholder { color: #666; }
        .input-area button {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .input-area button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }
        .quick-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.05);
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border-color: rgba(0, 212, 255, 0.4);
        }
        .result-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-card .question {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .result-card .answer {
            line-height: 1.8;
            font-size: 14px;
            white-space: pre-wrap;
            color: #ccc;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }
        .loading .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d4ff;
            margin: 0 4px;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loading .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RAG 智能问答系统</h1>
        <p class="subtitle">
            <span>Flask</span> + <span>Sentence Transformers</span> + <span>FAISS</span>
        </p>

        <div class="input-area">
            <input type="text" id="questionInput" placeholder="请输入您的问题，例如：什么是RAG技术？" />
            <button id="askBtn" onclick="askQuestion()">提问</button>
        </div>

        <div class="quick-questions">
            <button class="quick-btn" onclick="quickAsk('什么是RAG技术？')">什么是RAG技术？</button>
            <button class="quick-btn" onclick="quickAsk('FAISS是什么？')">FAISS是什么？</button>
            <button class="quick-btn" onclick="quickAsk('Python语言有什么特点？')">Python语言特点</button>
            <button class="quick-btn" onclick="quickAsk('什么是文本嵌入？')">什么是文本嵌入？</button>
            <button class="quick-btn" onclick="quickAsk('深度学习和机器学习的区别？')">深度学习 vs 机器学习</button>
        </div>

        <div id="resultArea">
            <div class="empty-state">
                <div class="icon">&#128270;</div>
                <p>输入问题或点击上方快捷提问，体验 RAG 检索增强生成</p>
            </div>
        </div>

        <div class="footer">
            RAG Retrieval-Augmented Generation &copy; 2026
        </div>
    </div>

    <script>
        const input = document.getElementById('questionInput');
        const btn = document.getElementById('askBtn');
        const resultArea = document.getElementById('resultArea');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') askQuestion();
        });

        function quickAsk(q) {
            input.value = q;
            askQuestion();
        }

        function askQuestion() {
            const question = input.value.trim();
            if (!question) return;

            btn.disabled = true;
            btn.textContent = '检索中...';
            resultArea.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><br><br>正在从知识库中检索相关文档...</div>';

            fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    resultArea.innerHTML = '<div class="result-card"><p style="color:#ff6b6b;">' + data.error + '</p></div>';
                } else {
                    resultArea.innerHTML = `
                        <div class="result-card">
                            <div class="question">Q: ${escapeHtml(data.question)}</div>
                            <div class="answer">${escapeHtml(data.answer)}</div>
                        </div>
                    `;
                }
            })
            .catch(err => {
                resultArea.innerHTML = '<div class="result-card"><p style="color:#ff6b6b;">请求失败，请检查服务是否启动</p></div>';
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '提问';
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
